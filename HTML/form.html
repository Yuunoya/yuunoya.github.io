<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Lesson</title>
</head>
<body>
    <p align="right">YuuNoya</p>
    <h1>Student Registration</h1>
    <form action="request.php" method="post">
        <label for="name">Name:</label>
        <input type="text" name="stu_name" id="name">
        <br><br>
        <label for="email">Email:</label>
        <input type="email" name="stu_email" id="email">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" name="stu_password" id="password">
        <br><br>
        <label for="phone">Phone:</label>
        <input type="number" name="stu_phone" id="phone">
        <br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" name="stu_dob" id="dob">
        <br><br>
        <label for="passport">Passport:</label>
        <input type="file" accept="image/*" name="stu_passport" id="passport">
        <br><br>
        <label for="">Gender:</label>
        <input type="radio" name="gender" id="male" value="Male"><label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="Female"><label for="female">Female</label>
        <br><br>
        <label for="year">Year:</label>
        <select name="year" id="year">
            <option value="1">First Year</option>
            <option value="2">Second Year</option>
            <option value="3">Third Year</option>
            <option value="4">Fourth Year</option>
        </select>
        <br><br>
        <label for="">Hobbies:</label>
        <input type="checkbox" name="Reading" id="reading" value="Reading"><label for="reading">Reading</label>
        <input type="checkbox" name="Swimming" id="swimming" value="Swimming"><label for="swimming">Swimming</label>
        <input type="checkbox" name="Coding" id="coding" value="Coding"><label for="coding">Coding</label>
        <br><br>
        <label for="address">Address:</label>
        <textarea name="stu_address" id="address" rows="4" cols="50"></textarea>
        <br><br>
        <label for="time">Preferred Time:</label>
        <input type="time" name="preferred_time" id="time">
        <br><br>
        <label for="datetime">Preferred Date and Time:</label>
        <input type="datetime-local" name="preferred_datetime" id="datetime">
        <br><br>
        <labek for="color">Favorite Color:</label>
        <input type="color" name="favorite_color" id="color">
        <br><br>
        <input type="range" min="0" max="100" name="range_value" id="range">
        <br><br>
        <input type="number" name="placeholder" id="" placeholder="0632637600" required>
        <button type="submit" style="background-color:green; color:white">Save</button>
    </form>

</body>
</html>
