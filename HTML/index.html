<!DOCTYPE html>
<html>
    <head>
        <!-- This is title element -->
        <title>Html Introduction</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- This is h1 element -->
        <h1 class="head">Hello, World!</h1>

        <!-- This is p element -->
        <p>My name is Noya. I started learning HTML. Now it's my first time try and how is it?</p>

        <!-- This is another p tag. -->
        <p></p>
        <div>
            <p>
                <span> Alright! </span>
            </p>
        </div>
        <h1>Let's go</h1>

        <!-- Attribute -->
         <p Align="right" id="p1" class="p-tag"> This is right side. </p>

        <!-- Ugly code -->
         <div><p><div><span> Hello, world</span></div></p></div>

         <!-- Pretty code -->
          <div>
            <p>
                <div>
                    <span> Hello, world</span>
                </div>
            </p>
          </div>
    </body>


</html>
