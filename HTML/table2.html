<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Lesson 2</title>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="10">
        <thead>
            <tr>
                <th>No.</th>
                <th>Item Names</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>3D Toothpaste</td>
                <td>3200</td>
                <td>3</td>
                <td>9600</td>
            </tr>
             <tr>
                <td>2</td>
                <td>Egg</td>
                <td>500</td>
                <td>8</td>
                <td>4000</td>
            </tr>
             <tr>
                <td>3</td>
                <td>Container</td>
                <td>1300</td>
                <td>4</td>
                <td>5200</td>
            </tr>
         </tbody>
         <tfoot>
            <tr>
                <th colspan="4">Total</th>
                <th>18800</th>
            </tr>
        </tfoot>
     </table>
    
     <h1>Save Money</h1>
     <table border="1" cellspacing="0" cellpadding="10">
        <thead>
            <tr>
                <th>Month</th>
                <th>Amount</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>January</td>
                <td>50000</td>
                <td rowspan="3">180000</td>
            </tr>
            <tr>
                <td>February</td>
                <td>60000</td>
            </tr>
            <tr>
                <td>March</td>
                <td>70000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                
            </tr>
        </tfoot>
    </table>
</body>
</html>
